name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build (amd64 local, für image-smoke)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: iuk-suite:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: image-smoke — Health mit Host-Header
        run: |
          docker run -d --rm --name smoke -p 3000:3000 \
            -e AUTH_SECRET=smoke -e AUTH_DEV_LOGIN=true iuk-suite:ci
          for i in $(seq 1 20); do
            if curl -fsS -H "Host: iuk-ue.de" http://127.0.0.1:3000/api/health/portal; then ok=1; break; fi
            sleep 2
          done
          docker logs smoke | tail -30
          docker stop smoke
          test "${ok:-0}" = "1"
      - name: Build + Push (multi-arch, nur main)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
